run_name: final_model
model: compact_resnet
data_dir: ./data
batch_size: 128
num_workers: 4
pin_memory: true
epochs: 100
optimizer: sgd
lr: 0.1
momentum: 0.9
weight_decay: 0.0005
scheduler: cosine
loss: ce_label_smoothing
label_smoothing: 0.1
activation: silu
dropout: 0.2
channels: [64, 128, 256]
seed: 42
train_split: dev
checkpoint_selection_split: val
use_test_during_training: false
split_seed: 42
split_file: splits/cifar10_train45000_val5000_seed42.json
save_dir: results/checkpoints
log_dir: results/logs
metrics_dir: results/metrics
metrics_filename: final_results.csv
checkpoint: results/checkpoints/final_model_best_val.pt
save_prefix: results/metrics/final
figures_dir: results/figures
