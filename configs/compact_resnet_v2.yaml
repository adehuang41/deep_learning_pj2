run_name: compact_resnet_v2
model: compact_resnet_v2
data_dir: ./data
batch_size: 256
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 4
epochs: 150
optimizer: sgd
lr: 0.2
momentum: 0.9
nesterov: true
weight_decay: 0.0005
scheduler: cosine
loss: ce_label_smoothing
label_smoothing: 0.1
activation: silu
dropout: 0.2
channels: [64, 128, 256, 384]
blocks_per_stage: [2, 2, 2, 2]
drop_path_rate: 0.05
use_eca: true
randaugment: false
cutout: true
cutout_length: 16
cutout_p: 1.0
seed: 42
split_seed: 42
split_file: splits/cifar10_train45000_val5000_seed42.json
train_split: dev
checkpoint_selection_split: val
use_test_during_training: false
amp: false
channels_last: false
cudnn_benchmark: true
save_dir: results/checkpoints
log_dir: results/logs
metrics_dir: results/metrics
protocol_dir: results/protocol
checkpoint: results/checkpoints/compact_resnet_v2_best_val.pt
save_prefix: results/metrics/compact_resnet_v2
figures_dir: results/figures
