run_name: champion_w4
model: preact_resnet_cifar
data_dir: ./data
batch_size: 256
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 4
epochs: 200
optimizer: sgd
lr: 0.2
momentum: 0.9
nesterov: true
weight_decay: 0.0005
scheduler: cosine
loss: ce_label_smoothing
label_smoothing: 0.05
activation: relu
dropout: 0.3
depth: 28
widen_factor: 4
randaugment: true
randaugment_num_ops: 2
randaugment_magnitude: 9
cutout: true
cutout_length: 16
cutout_p: 1.0
ema: true
ema_decay: 0.999
seed: 42
split_seed: 42
split_file: splits/cifar10_train45000_val5000_seed42.json
train_split: dev
checkpoint_selection_split: val
use_test_during_training: false
amp: false
channels_last: false
cudnn_benchmark: true
save_dir: results/checkpoints
log_dir: results/logs
metrics_dir: results/metrics
protocol_dir: results/protocol
checkpoint: results/checkpoints/champion_w4_best_val.pt
save_prefix: results/metrics/champion_w4
figures_dir: results/figures
