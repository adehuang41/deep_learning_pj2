run_name: baseline
model: simple_cnn
data_dir: ./data
batch_size: 128
num_workers: 4
pin_memory: true
epochs: 50
optimizer: sgd
lr: 0.05
momentum: 0.9
weight_decay: 0.0005
scheduler: cosine
loss: ce
activation: relu
dropout: 0.3
seed: 42
train_split: dev
checkpoint_selection_split: val
use_test_during_training: false
split_seed: 42
split_file: splits/cifar10_train45000_val5000_seed42.json
save_dir: results/checkpoints
log_dir: results/logs
metrics_dir: results/metrics
